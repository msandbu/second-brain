name: Sync notes to second-brain MCP

on:
  push:
    branches: [main]
    paths:
      - 'blogposts/**'
      - 'talks/**'
      - 'frameworks/**'
      - 'me/**'
  workflow_dispatch:
    inputs:
      full_sync:
        description: 'Sync all notes (not just changed files)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Sync notes to Cloudflare Worker
        env:
          WORKER_URL: ${{ secrets.SECOND_BRAIN_WORKER_URL }}
          SYNC_TOKEN: ${{ secrets.SECOND_BRAIN_SYNC_TOKEN }}
          FULL_SYNC: ${{ github.event.inputs.full_sync || 'false' }}
        run: |
          set -euo pipefail

          echo "WORKER_URL is set: $([[ -n "$WORKER_URL" ]] && echo yes || echo NO)"
          echo "SYNC_TOKEN is set: $([[ -n "$SYNC_TOKEN" ]] && echo yes || echo NO)"

          sync_file() {
            local filepath="$1"
            echo "Syncing: $filepath"
            content=$(cat "$filepath" | jq -Rs .)
            response=$(curl -s -w "\n%{http_code}" -X POST "${WORKER_URL}/api/notes/sync" \
              -H "Authorization: Bearer ${SYNC_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"path\": \"${filepath}\", \"content\": ${content}}")
            http_code=$(echo "$response" | tail -1)
            body=$(echo "$response" | head -n -1)
            echo "HTTP $http_code: $body"
            if [[ "$http_code" -lt 200 || "$http_code" -ge 300 ]]; then
              echo "ERROR: Failed to sync $filepath (HTTP $http_code)"
              exit 1
            fi
          }

          delete_file() {
            local filepath="$1"
            echo "Deleting: $filepath"
            response=$(curl -s -w "\n%{http_code}" -X POST "${WORKER_URL}/api/notes/sync" \
              -H "Authorization: Bearer ${SYNC_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"path\": \"${filepath}\", \"deleted\": true}")
            http_code=$(echo "$response" | tail -1)
            body=$(echo "$response" | head -n -1)
            echo "HTTP $http_code: $body"
            if [[ "$http_code" -lt 200 || "$http_code" -ge 300 ]]; then
              echo "ERROR: Failed to delete $filepath (HTTP $http_code)"
              exit 1
            fi
          }

          if [[ "$FULL_SYNC" == "true" ]]; then
            echo "=== Full sync of all notes ==="
            find blogposts talks frameworks me -name '*.md' | while read -r filepath; do
              sync_file "$filepath"
            done
          else
            echo "=== Incremental sync ==="
            git diff --name-status HEAD~1 HEAD > changed.txt || \
              git diff --name-status $(git hash-object -t tree /dev/null) HEAD > changed.txt

            echo "Changed files:"
            cat changed.txt

            while IFS=$'\t' read -r status filepath rest; do
              [[ "$filepath" != *.md ]] && continue
              [[ "$filepath" != blogposts/* && "$filepath" != talks/* && \
                 "$filepath" != frameworks/* && \
                 "$filepath" != me/* ]] && continue

              if [[ "$status" == "D" ]]; then
                delete_file "$filepath"
              else
                sync_file "$filepath"
              fi
            done < changed.txt
          fi

          echo "Sync complete."
